name: Robots

on:
  schedule:
    # at minute 0 of every hour" i.e., runs once per hour, on the hour (00:00, 01:00, 02:00, ... 23:00)
    - cron: '0 * * * *' 
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: true
        default: 'Robots'
        type: choice
        options: [Robots, AIR, OCN, TRN, MMD]
      EXPORT_TEMPLATE:
        description: 'Export Template'
        required: false
        default: 'RELEASE'
        type: string
      CF_RUNMODE:
        description: 'CFIT Runmode'
        required: false
        default: 'P'
        type: choice
        options: [A, B, N, P]

jobs:
  build:
    uses: ./.github/workflows/Compile.yml

  Air:
    runs-on: ubuntu-latest
    needs: build
    if: contains(fromJson('["Robots","AIR"]'), inputs.TEST_PROFILE)

    strategy:
      fail-fast: false
      matrix:
        profile: [Air Origin, Airt Gateway 1]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Maven
        env:
          TEST_PROFILE: ${{ inputs.TEST_PROFILE }}
          EXPORT_TEMPLATE: ${{ inputs.EXPORT_TEMPLATE }}
          CF_RUNMODE: ${{ inputs.CF_RUNMODE }}
          POM_PROFILE: matrix.profile
        run: bash .github/scripts/run-maven.sh  