name: CI Compile

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  compile:
    name: compile
    runs-on:
      - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        shell: bash
        run: |
          java -version
          mvn -v

      - name: Build
        shell: bash
        run: mvn --batch-mode clean install
