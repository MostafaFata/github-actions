name: MCGWS

on:
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: true
        default: 'ALL'
        type: choice
        options:
          - MCGWS
          - MCGWSI
          - MCGWSE
          - MCGWSL

  workflow_call:
        inputs:
          some_input:
            required: false
            type: string

jobs:
  build:
    uses: ./.github/workflows/ci-compile.yml

  gwson:
    runs-on: ubuntu-latest
    needs: build
    # Evaluates the input directly. On schedule, inputs are blank, so the || 'ALL' defaults it to 'ALL'
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSE' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSI' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSL' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: echo "Turning GWS ON"
  # ================= PHASE 1 (PARALLEL) =================
  mcgwse:
    runs-on: ubuntu-latest
    needs: [build, gwson]
    # Evaluates the input directly. On schedule, inputs are blank, so the || 'ALL' defaults it to 'ALL'
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSE' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: echo "Running MCGWSE"

  mcgwsi:
    runs-on: ubuntu-latest
    needs: [build, gwson]
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSI' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: echo "Running MCGWSI"

  mcgwsl:
    runs-on: ubuntu-latest
    needs: [build, gwson]
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSL' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: echo "Running MCGWSL"
