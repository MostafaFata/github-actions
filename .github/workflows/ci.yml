name: CI/CD Pipeline

on:
  schedule:
    # Example: Runs every day at midnight (Adjust as necessary)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: false
        default: ''

env:
  EXPORT_TEMPLATE: 'ONE'
  CF_RUNMODE: 'Y'
  PROFILE: ''
  # If triggered via UI/API, use input. If scheduled, default empty or set standard profile.
  TEST_PROFILE: ${{ github.event.inputs.TEST_PROFILE || '' }}

jobs:
  # ----------------------------------------
  # STAGE: build
  # ----------------------------------------
  compile:
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Before Script
        run: echo "Before script section"
      
      - name: Compile
        run: echo "Compile here"
      
      - name: After Script
        if: always()
        run: |
          echo "After script section"
          echo "Setting >>>> Profile=$PROFILE | Export=$EXPORT_TEMPLATE | Cfit=$CF_RUNMODE <<<<<"

  # ----------------------------------------
  # STAGE: mclite
  # ----------------------------------------
  mcLite:
    needs: compile
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    # Rule check: pipeline source (workflow_run/dispatch) or PROFILE matches MCLITE
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'workflow_run' || 
      regex-match(github.env.TEST_PROFILE, '^MCLITE$')
    steps:
      - name: Run MCLite Test
        run: echo "MCLite Test"

  # ----------------------------------------
  # STAGE: gdflag_gws
  # ----------------------------------------
  gwsson:
    needs: mcLite
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    continue-on-error: true
    steps:
      - name: Check Rules & Run
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCGWS([LIE])?$|^GWSON$|^ALL(INV|E2E)?$ ]]; then
            echo "Turn GWS flag on"
            exit 1
          else
            echo "Skipped due to rule matching"
          fi

  gws_rpt:
    needs: [mcLite, gwsson]
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Check Rules & Run
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCGWS([LIE])?$|^GWSON$|^ALL(INV|E2E)?$ ]]; then
            echo "Print GWS flag report"
          else
            echo "Skipped due to rule matching"
          fi

  # ----------------------------------------
  # STAGE: gws
  # ----------------------------------------
  mcgwsl:
    needs: [gwsson, gws_rpt]
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ -n "$TEST_PROFILE" && "$TEST_PROFILE" =~ ^MCGWS(L)?$|^ALL$ ]]; then
            echo "mcgwsl"
          fi

  mcgwsi:
    needs: [gwsson, gws_rpt]
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCGWS(I)?$|^ALL(INV)?$ ]]; then
            echo "mcgwsi"
          fi

  mcgwse:
    needs: [gwsson, gws_rpt]
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCGWS(E)?$|^ALL(E2E)?$ ]]; then
            echo "mcgwse"
          fi

  # ----------------------------------------
  # STAGE: gdflag_sos & sos
  # ----------------------------------------
  soson:
    needs: [mcgwsl, mcgwsi, mcgwse]
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "$TEST_PROFILE" =~ ^SOSON$|^MCSOS([LIE])?$|^ALL(INV|E2E)?$ ]]; then
            echo "Turn SOS flag on"
          fi

  mcsosl:
    needs: soson
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCSOS(L)?$|^ALL$ ]]; then
            echo "mcsosl"
          fi

  mcsosi:
    needs: soson
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCSOS(I)?$|^ALL(INV)?$ ]]; then
            echo "mcsosi"
          fi

  mcsose:
    needs: soson
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "$TEST_PROFILE" =~ ^MCSOS(E)?$|^ALL(E2E)?$ ]]; then
            echo "mcsose"
          fi

  mcsosu:
    needs: soson
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Run Step
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^MCSOSU$|^ALL$ ]]; then
            echo "mcsosu"
          fi

  # ----------------------------------------
  # STAGES: air, ocean, mmd, truck (Robots & Buckets)
  # ----------------------------------------
  # Combining dynamic scripts with an engine to keep things DRY.
  robots_and_buckets_tasks:
    needs: [mcsosl, mcsosi, mcsose, mcsosu]
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Execute Robots & Buckets Logic
        run: |
          # --- Robots Rules Reference ---
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^Robots$ ]]; then
            echo "Executing Robots Tasks Across Air, Ocean, MMD, Truck..."
            echo "mcRobotsAirOrigin: robots"
            echo "mcRobotsAirGtwy1: robots"
            echo "mcRobotsOceanOrigin: robots"
            echo "mcRobotsOceanGtwy1: robots"
            echo "mcRobotsOceanGtwy2: robots"
            echo "mcRobotsMmdOrigin: robots"
            echo "mcRobotsMmdGtwy1: robots"
            echo "mcRobotsTruckOrigin: robots"
            echo "mcRobotsTruckGtwy1: robots"
            echo "mcRobotsTruckGtwy2: robots"
          fi

          # --- Buckets Rules Reference ---
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^Buckets$ ]]; then
            echo "Executing Buckets Tasks Across Air, Ocean, MMD, Truck..."
            echo "airBucket: buckets"
            echo "oceanBucket: buckets"
            echo "mmdBucket: buckets"
            echo "truckBucket: buckets"
          fi

  # ----------------------------------------
  # STAGE: catalogRegression
  # ----------------------------------------
  catalog_regression:
    needs: robots_and_buckets_tasks
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: mcCatalogSTG
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^STG$|^Catalog(Reg)?$ ]]; then
            echo "catalog regression"
          fi
      - name: mcLiteSTG
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^STG$|^Catalog(Lite)?$ ]]; then
            echo "catalog regression"
          fi

  # ----------------------------------------
  # STAGE: CFITRegression (Uses Template Logic)
  # ----------------------------------------
  cfit_regression:
    needs: catalog_regression
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: CFITRegOpAcc
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^STG$|^CFITReg(OpAcc)?$ ]]; then
            export PROFILE="CFITRegOpAcc"
            echo "Running $PROFILE on $EXPORT_TEMPLATE and $CF_RUNMODE"
            mkdir -p build_output
            echo "This is a $PROFILE artifact." > build_output/$PROFILE.txt
          fi
          
      - name: Upload CFITRegOpAcc Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_output-OpAcc
          path: build_output/
          retention-days: 1 # nearest match to 1 hour target

      - name: CFITRegInvRI
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ ^STG$|^CFITReg(InvRI)?$ ]]; then
            export PROFILE="CFITRegInvRI"
            echo "Running $PROFILE on $EXPORT_TEMPLATE and $CF_RUNMODE"
            mkdir -p build_output
            echo "This is a $PROFILE artifact." > build_output/$PROFILE.txt
          fi
          
      - name: Upload CFITRegInvRI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_output-InvRI
          path: build_output/
          retention-days: 7 # Matches 1 week expire_in

  # ----------------------------------------
  # STAGE: mcflex
  # ----------------------------------------
  mcflex:
    needs: cfit_regression
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: MCFLEX Task
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$TEST_PROFILE" =~ /^MCFLEX$/ ]]; then
            # Override locals
            EXPORT_TEMPLATE=""
            CF_RUNMODE=""
            PROFILE=""
            echo "Running MCFLEX template script"
            mkdir -p build_output
            echo "This is a $PROFILE artifact." > build_output/$PROFILE.txt
          fi

  # ----------------------------------------
  # STAGE: documentation / deploy (Pages)
  # ----------------------------------------
  pages:
    needs: mcflex
    runs-on: ubuntu-latest
    container:
      image: busybox:latest
    steps:
      - name: Generate Pages Script
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && -z "$TEST_PROFILE" ]]; then
            export PROFILE="Pages"
            export CF_RUNMODE="Z"
            
            # Replicating base .mvn_script template
            echo "Running $PROFILE on $EXPORT_TEMPLATE and $CF_RUNMODE"
            mkdir -p build_output
            echo "This is a $PROFILE artifact." > build_output/$PROFILE.txt
            
            # Replicating after_script report building logic
            echo "<html><body><h1>Available Reports</h1><ul>" > build_output/index.html
            for dir in build_output/*; do
              if [ -d "$dir" ]; then
                name=$(basename "$dir");
                echo "<li><a href=\"$name/index.html\">$name</a></li>" >> build_output/index.html;
              fi;
            done
            echo "</ul></body></html>" >> build_output/index.html
          fi
