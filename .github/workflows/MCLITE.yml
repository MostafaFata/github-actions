name: MCLITE

on:
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: true
        default: 'MCLITE'
        type: choice
        options: [MCLITE]
      EXPORT_TEMPLATE:
        description: 'Export Template'
        required: false
        default: 'TPV01'
        type: string
      CF_RUNMODE:
        description: 'CFIT Runmode'
        required: false
        default: 'P'
        type: choice
        options: [A, B, N, P]
    
  workflow_run:
    workflows: ["GWS Workflow"] 
    types:
      - completed

  workflow_call:
        inputs:
          skip_build:
            required: false
            type: boolean
            default: false

jobs:
  build:
    if: ${{ !inputs.skip_build }}
    uses: ./.github/workflows/ci-compile.yml

  mcLite:
    runs-on: ubuntu-latest
    needs: build
    if: always() && contains(fromJson('["MCLITE"]'), inputs.TEST_PROFILE)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Maven
        env:
          TEST_PROFILE: ${{ inputs.TEST_PROFILE }}
          EXPORT_TEMPLATE: ${{ inputs.EXPORT_TEMPLATE }}
          CF_RUNMODE: ${{ inputs.CF_RUNMODE }}
          POM_PROFILE: MCLite
        run: bash .github/scripts/run-maven.sh
