name: Combined-Schedule-Dispatch-Fixed

on:
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: false
        default: 'ALL'
        type: choice
        options:
          - MCGWS
          - MCSOS
          - ALL

  schedule:
    - cron: '0 19 * * *'

jobs:
  build:
    uses: ./.github/workflows/ci-compile.yml

  # ================= PHASE 1 (PARALLEL) =================
  mcgwsi:
    runs-on: ubuntu-latest
    needs: build
    # Evaluates the input directly. On schedule, inputs are blank, so the || 'ALL' defaults it to 'ALL'
    if: |
      !cancelled() && 
      ((github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
       (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL')
    steps:
      - name: Run Profile
        run: echo "Running MCGWSI"

  mcgwse:
    runs-on: ubuntu-latest
    needs: build
    if: |
      !cancelled() && 
      ((github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
       (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL')
    steps:
      - name: Run Profile
        run: echo "Running MCGWSE"

  # ================= PHASE 2 (PARALLEL) =================
  mcsosi:
    runs-on: ubuntu-latest
    needs: [build, mcgwsi, mcgwse]
    # always() ensures this block evaluates even if Phase 1 was skipped (e.g. when choosing MCSOS)
    if: |
      always() && !cancelled() && 
      ((github.event.inputs.TEST_PROFILE || 'ALL') == 'MCSOS' || 
       (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL')
    steps:
      - name: Run Profile
        run: echo "Running MCSOSI"

  mcsose:
    runs-on: ubuntu-latest
    needs: [build, mcgwsi, mcgwse]
    if: |
      always() && !cancelled() && 
      ((github.event.inputs.TEST_PROFILE || 'ALL') == 'MCSOS' || 
       (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL')
    steps:
      - name: Run Profile
        run: echo "Running MCSOSE"
