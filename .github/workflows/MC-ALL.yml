name: MC-ALL

on:
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: true
        default: 'ALL'
        type: choice
        options: [ALL]
      EXPORT_TEMPLATE:
        description: 'Export Template'
        required: false
        default: 'TPV01'
        type: string
      CF_RUNMODE:
        description: 'CFIT Runmode'
        required: false
        default: 'B'
        type: choice
        options: [A, B, N, P]

jobs:
  gws-all:
    uses: ./.github/workflows/MCGWS.yml

  sos-all:
    needs: gws-all
    if: always()
    uses: ./.github/workflows/MCSOS.yml
    with:
      skip_build: true


