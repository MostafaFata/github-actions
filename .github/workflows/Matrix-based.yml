name: MCGWS

on:
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: true
        default: 'ALL'
        type: choice
        options: [MCGWS, MCGWSI, MCGWSE, MCGWSL]
      EXPORT_TEMPLATE:
        description: 'Export Template'
        required: false
        default: 'TPV01'
        type: string
      CF_RUNMODE:
        description: 'CFIT Runmode'
        required: false
        default: 'B'
        type: choice
        options: [A, B, N, P]

  workflow_call:
    inputs:
      skip_build:
        required: false
        type: boolean
        default: false         
      TEST_PROFILE:
        required: false
        type: string
        default: 'ALL'

jobs:
  build:
    if: ${{ !inputs.skip_build }}
    uses: ./.github/workflows/ci-compile.yml

  gwson:
    runs-on: ubuntu-latest
    needs: build
    if: contains(fromJson('["MCGWS","MCGWSE","MCGWSI","MCGWSL","ALL"]'), inputs.TEST_PROFILE)
    steps:
      - name: Run Profile
        run: echo "Turning GWS ON"

  # Matrix job replaces mcgwse, mcgwsi, mcgwsl
  run-profiles:
    runs-on: ubuntu-latest
    needs: [build, gwson]

    strategy:
      matrix:
        profile: [MCGWSE, MCGWSI, MCGWSL]

    # Filter logic (same behavior as before)
    if: |
      inputs.TEST_PROFILE == 'ALL' ||
      inputs.TEST_PROFILE == 'MCGWS' ||
      inputs.TEST_PROFILE == matrix.profile

    env:
      PROFILE: ${{ matrix.profile }}
      EXPORT_TEMPLATE: ${{ inputs.EXPORT_TEMPLATE }}
      CF_RUNMODE: ${{ inputs.CF_RUNMODE }}

    steps:
      - name: Run Profile
        run: |
          echo "PROFILE: ${PROFILE}"
          echo "TEST_PROFILE: ${{ inputs.TEST_PROFILE }}"
          echo "EXPORT_TEMPLATE: ${EXPORT_TEMPLATE}"
          echo "CF_RUNMODE: ${CF_RUNMODE}"