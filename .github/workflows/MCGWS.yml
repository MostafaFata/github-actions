name: MCGWS

on:
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: true
        default: 'ALL'
        type: choice
        options:
          - MCGWS
          - MCGWSI
          - MCGWSE
          - MCGWSL
      EXPORT_TEMPLATE:
        description: 'Export Template'
        required: false
        default: 'TPV01'
        type: string
      CF_RUNMODE:
        description: 'CFIT Runmode'
        required: false
        default: 'B'
        type: choice
        options:
          - A
          - B
          - N
          - P
  workflow_call:
        inputs:
          skip_build:
            required: false
            type: boolean
            default: false

jobs:
  build:
    if: ${{ !inputs.skip_build }}
    uses: ./.github/workflows/ci-compile.yml

  gwson:
    runs-on: ubuntu-latest
    needs: build
    # Evaluates the input directly. On schedule, inputs are blank, so the || 'ALL' defaults it to 'ALL'
    if: contains(fromJson('["MCGWS","MCGWSE","MCGWSI","MCGWSL","ALL"]'), inputs.TEST_PROFILE)
    steps:
      - name: Run Profile
        run: echo "Turning GWS ON"
  # ================= PHASE 1 (PARALLEL) =================
  mcgwse:
    runs-on: ubuntu-latest
    needs: [build, gwson]
    # Evaluates the input directly. On schedule, inputs are blank, so the || 'ALL' defaults it to 'ALL'
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSE' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: |
          echo "TEST_PROFILE: ${{ inputs.TEST_PROFILE }}"
          echo "EXPORT_TEMPLATE: ${{ inputs.EXPORT_TEMPLATE }}"
          echo "CF_RUNMODE: ${{ inputs.CF_RUNMODE }}"

  mcgwsi:
    runs-on: ubuntu-latest
    needs: [build, gwson]
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSI' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: |
          echo "TEST_PROFILE: ${{ inputs.TEST_PROFILE }}"
          echo "EXPORT_TEMPLATE: ${{ inputs.EXPORT_TEMPLATE }}"
          echo "CF_RUNMODE: ${{ inputs.CF_RUNMODE }}"

  mcgwsl:
    runs-on: ubuntu-latest
    needs: [build, gwson]
    if: |
      (
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWS' || 
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'MCGWSL' ||
        (github.event.inputs.TEST_PROFILE || 'ALL') == 'ALL'
      )
    steps:
      - name: Run Profile
        run: |
          echo "TEST_PROFILE: ${{ inputs.TEST_PROFILE }}"
          echo "EXPORT_TEMPLATE: ${{ inputs.EXPORT_TEMPLATE }}"
          echo "CF_RUNMODE: ${{ inputs.CF_RUNMODE }}"
