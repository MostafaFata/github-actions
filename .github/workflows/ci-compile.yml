name: CI Compile

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
  workflow_call:
      inputs:
        some_input:
          required: false
          type: string


jobs:
  compile:
    name: build
    runs-on:
      - ubuntu-latest
      
    steps:
      - name: Show versions
        shell: bash
        run: |
          java -version
