name: CFIT

env:
  STG_Schedule: '0 8 * * *'
  QA_Schedule: '30 22 * * 4'
  EXPORT_TEMPLATE: RELEASE
  CF_RUNMODE: N  

on:
  schedule:
    # at minute 0 of every hour" i.e., runs once per hour, on the hour (00:00, 01:00, 02:00, ... 23:00)
    - cron: ${{ env.STG_Schedule }}
    - cron: ${{ env.QA_Schedule }} 
  workflow_dispatch:
    inputs:
      target:
        description: CFIT Test Suites
        required: true
        default: STAGING
        type: choice
        options:
          - STAGING
          - QA
    
jobs:
  build:
    uses: ./.github/workflows/Compile.yml

  CFIT_App_Controls:
    if: > 
      (github.event_name == 'schedule' && 
       github.event.schedule == ${{ env.STG_Schedule }}) || 
      (github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.target == 'STAGING'))
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Maven
        env:
          EXPORT_TEMPLATE: ${{ env.EXPORT_TEMPLATE }}
          CF_RUNMODE: ${{ env.CF_RUNMODE }}
          POM_PROFILE: CFITAppControls
        run: bash .github/scripts/run-maven.sh

  CFIT_General:
    if: > 
      (github.event_name == 'schedule' && 
       github.event.schedule == ${{ env.STG_Schedule }}) || 
      (github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.target == 'STAGING'))
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Maven
        env:
          EXPORT_TEMPLATE: ${{ env.EXPORT_TEMPLATE }}
          CF_RUNMODE: ${{ env.CF_RUNMODE }}
          POM_PROFILE: CFITGeneral
        run: bash .github/scripts/run-maven.sh

  CFIT_QA:
    if: > 
      (github.event_name == 'schedule' && 
       github.event.schedule == ${{ env.QA_Schedule }}) || 
      (github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.target == 'QA'))
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Maven
        env:
          EXPORT_TEMPLATE: 'TPV01'
          CF_RUNMODE: ${{ env.CF_RUNMODE }}
          POM_PROFILE: CFITQA
        run: bash .github/scripts/run-maven.sh
