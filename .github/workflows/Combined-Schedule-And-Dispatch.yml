name: Combined-Schedule-And-Dispatch

on:
  # Trigger 1: Manual dropdown selection
  workflow_dispatch:
    inputs:
      TEST_PROFILE:
        description: 'Profile to run'
        required: false
        default: 'ALL'
        type: choice
        options:
          - MCGWS
          - MCSOS
          - ALL

  # Trigger 2: Automated schedule (e.g., Every day at midnight UTC)
  schedule:
    # 6:00 AM UTC = 11:00 PM Seattle Time in Summer
    # (Note: This will become 10:00 PM Seattle Time in Winter)
    - cron: '*/10 * * * *'

jobs:
  mcgwsi:
    runs-on: ubuntu-latest
    # If triggered by schedule, default to 'ALL'. Otherwise, use the manual input choice.
    if: |
      !cancelled() && 
      (
        (github.event_name == 'schedule' && 'ALL' == 'ALL') ||
        (github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.TEST_PROFILE == 'MCGWS' || 
           github.event.inputs.TEST_PROFILE == 'ALL')
        )
      )
    steps:
      # We use an expression to safely echo the correct profile name
      - name: Run Profile
        run: |
          PROFILE="${{ github.event.inputs.TEST_PROFILE || 'ALL' }}"
          echo "Running profile: $PROFILE"

  mcgwse:
    runs-on: ubuntu-latest
    # If triggered by schedule, default to 'ALL'. Otherwise, use the manual input choice.
    if: |
      !cancelled() && 
      (
        (github.event_name == 'schedule' && 'ALL' == 'ALL') ||
        (github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.TEST_PROFILE == 'MCGWS' || 
           github.event.inputs.TEST_PROFILE == 'ALL')
        )
      )
    steps:
      # We use an expression to safely echo the correct profile name
      - name: Run Profile
        run: |
          PROFILE="${{ github.event.inputs.TEST_PROFILE || 'ALL' }}"
          echo "Running profile: $PROFILE"

  mcsosi:
    runs-on: ubuntu-latest
    needs: [mcgwsi, mcgwse]
    if: |
      !cancelled() && 
      (
        (github.event_name == 'schedule' && 'ALL' == 'ALL') ||
        (github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.TEST_PROFILE == 'MCSOS' || 
           github.event.inputs.TEST_PROFILE == 'ALL')
        )
      )
    steps:
      - name: Run Profile
        run: |
          PROFILE="${{ github.event.inputs.TEST_PROFILE || 'ALL' }}"
          echo "Running profile: $PROFILE"

  mcsose:
    runs-on: ubuntu-latest
    needs: [mcgwsi, mcgwse]
    if: |
      !cancelled() && 
      (
        (github.event_name == 'schedule' && 'ALL' == 'ALL') ||
        (github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.TEST_PROFILE == 'MCSOS' || 
           github.event.inputs.TEST_PROFILE == 'ALL')
        )
      )
    steps:
      - name: Run Profile
        run: |
          PROFILE="${{ github.event.inputs.TEST_PROFILE || 'ALL' }}"
          echo "Running profile: $PROFILE"